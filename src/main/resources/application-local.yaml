server:
  port: 8081


spring:
  datasource:
    url: jdbc:h2:mem:course_db
    driver-class-name: org.h2.Driver
    username: admin
    password: pass

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: none

  liquibase:
    change-log: classpath:/db/changelog/changelog.yaml
    enabled: true

logging:
  level:
    root: info

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /api-docs-ui.html