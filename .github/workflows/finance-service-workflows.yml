name: finance-service

on:
  push:
    branches: [ master ]
    paths:
      - 'finance-service'
      - 'docker-compose.yaml'
      - '.github/workflows/finance-service-workflows.yml'

  pull_request:
    branches: [ master ]
    paths:
      - 'finance-service'

  workflow_dispatch:


env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/finance-service
  SERVICE_DIR: finance-service
  DEPLOY_PATH: /opt/finance-service


jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup jdk
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: maven

      - name: Build with maven
        run: |
          mvn clean package -DskipTests
          mkdir -p ../dist
          cp target/*.jar ../dist/app.jar

      - name: Login registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          build-args: |
            SPRING_PROFILES_ACTIVE=prod

      - name: Copy docker-compose.yaml to vps
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "docker-compose.yaml"
          target: "/opt/finance-service"
          strip_components: 0

      - name: Deploy to vps
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /opt/course-service
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin 
            docker pull ${{ env.IMAGE_NAME }}:latest
            docker compose down
            docker compose up -d
            sleep 10
            docker image prune -f